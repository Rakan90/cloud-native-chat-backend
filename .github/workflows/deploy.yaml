name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push User Service image
        run: |
          docker build -t user-service ./user-service
          docker tag user-service:latest ${{ secrets.USER_SERVICE_ECR_URL }}:latest
          docker push ${{ secrets.USER_SERVICE_ECR_URL }}:latest

      - name: Build and push Message Service image
        run: |
          docker build -t message-service ./message-service
          docker tag message-service:latest ${{ secrets.MESSAGE_SERVICE_ECR_URL }}:latest
          docker push ${{ secrets.MESSAGE_SERVICE_ECR_URL }}:latest